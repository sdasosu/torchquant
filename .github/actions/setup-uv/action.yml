name: Setup UV
description: Install uv and sync dependencies

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Set up Python
      run: uv python install
      shell: bash

    - name: Install dependencies
      run: uv sync --all-extras --dev --locked
      shell: bash
